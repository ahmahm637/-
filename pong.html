<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            display: block;
            border: 3px solid white;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin: 0 auto;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
        }

        .player, .computer {
            flex: 1;
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .instructions p {
            margin: 5px 0;
        }

        .game-status {
            color: #00ff00;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="scoreboard">
            <div class="player">
                <p>Player</p>
                <p id="playerScore">0</p>
            </div>
            <div>
                <p>-</p>
            </div>
            <div class="computer">
                <p>Computer</p>
                <p id="computerScore">0</p>
            </div>
        </div>

        <div class="game-status" id="gameStatus"></div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse: Move paddle up/down</p>
            <p>⬆️⬇️ Arrow Keys: Move paddle up/down</p>
            <p>SPACE: Pause/Resume | R: Reset Game</p>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 6;

        // Player paddle
        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            score: 0,
            speed: 6
        };

        // Computer paddle
        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            speed: 4
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: ballSize,
            dx: 5,
            dy: 5,
            speed: 5
        };

        // Game state
        let gameRunning = true;
        let keys = {};

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ') {
                e.preventDefault();
                gameRunning = !gameRunning;
                updateStatus();
            }

            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = Math.max(0, Math.min(mouseY - paddleHeight / 2, canvas.height - paddleHeight));
        });

        // Update game status
        function updateStatus() {
            const statusEl = document.getElementById('gameStatus');
            if (gameRunning) {
                statusEl.textContent = '▶️ Game Running';
                statusEl.style.color = '#00ff00';
            } else {
                statusEl.textContent = '⏸️ Game Paused (Press SPACE to resume)';
                statusEl.style.color = '#ffaa00';
            }
        }

        // Update player paddle with arrow keys
        function updatePlayer() {
            if (keys['ArrowUp']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keys['ArrowDown']) {
                player.y = Math.min(canvas.height - paddleHeight, player.y + player.speed);
            }
        }

        // Update computer AI
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                computer.y = Math.min(canvas.height - paddleHeight, computer.y + computer.speed);
            } else if (computerCenter > ballCenter + 35) {
                computer.y = Math.max(0, computer.y - computer.speed);
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;
                
                // Add spin based on where ball hits paddle
                const deltaY = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy += deltaY * 3;
            }

            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;
                
                // Add spin based on where ball hits paddle
                const deltaY = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy += deltaY * 3;
            }

            // Limit ball speed
            const maxSpeed = 8;
            if (Math.abs(ball.dy) > maxSpeed) {
                ball.dy = (ball.dy / Math.abs(ball.dy)) * maxSpeed;
            }

            // Score and reset
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }

            // Update score display
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        // Reset entire game
        function resetGame() {
            player.score = 0;
            computer.score = 0;
            player.y = canvas.height / 2 - paddleHeight / 2;
            computer.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            gameRunning = true;
            updateStatus();
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Draw functions
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCenter() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');
            
            // Draw center line
            drawCenter();

            if (gameRunning) {
                updatePlayer();
                updateComputer();
                updateBall();
            }

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#00ff00');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#ff00ff');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.size, '#ffff00');

            requestAnimationFrame(gameLoop);
        }

        // Initialize game
        updateStatus();
        gameLoop();
    </script>
</body>
</html>
